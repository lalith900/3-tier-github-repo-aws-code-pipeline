version: '3'

services:

  nginx:
    image: nginx:latest
    container_name: nginx-proxy

    ports:
      - "80:80"

    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - frontend
      - backend

  frontend:
    build: ./frontend
    container_name: frontend

  backend:
    build: ./backend
    container_name: backend

    environment:
      DB_HOST: ${DB_HOST}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
